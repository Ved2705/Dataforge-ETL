dataforge:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DB_HOST', 'localhost') }}"
      user: "{{ env_var('DB_USER', 'dataforge') }}"
      password: "{{ env_var('DB_PASSWORD', 'dataforge') }}"
      port: 5432
      dbname: dataforge
      schema: public
      threads: 4
